        <main> 
            <h2 class="subtitulo">Formulario de contacto</h2>
            <form action="urlDestino" method="post">

                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Jijia">
                <br>

                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@gmail.com" required pattern="^[^@\s]+@[^@\s]+\.[^@\s]+$">
                <br>

                <label for="telefono">Teléfono:</label>
                <input type="tel" id="telefono" name="telefono">
                <br>

                <label for="fecha">Fecha:</label>
                <input type="date" id="fecha" name="fecha">
                <br>

                <label for="motivo">Motivo de contacto:</label>
                <select id="motivo" name="motivo">
                    <option value="">Seleccione una opción</option>
                    <option value="trabajo">Trabajo</option>
                    <option value="asesoria">Asesoría</option>
                    <option value="otro">Otro</option>
                </select>
                <br>

                <label>Cómo te gustaría contactarte:</label>
                <br>
                <input type="radio" id="contacto-correo" name="contacto" value="correo">
                <label for="contacto-correo">Correo</label>
                <br>

                <input type="radio" id="contacto-whats" name="contacto" value="whatsapp">
                <label for="contacto-whats">WhatsApp</label>
                <br>

                <button type="reset">Limpiar</button>
                <button type="submit">Guardar</button>

            </form>


        </main>
